<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Checkout Portal</title>

<!-- Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: linear-gradient(to right, #667eea, #764ba2);
}

.card {
	border-radius: 15px;
}

.checkout-btn {
	font-size: 14px;
}
</style>

<script>
	function confirmCheckout(roomNo) {
		return confirm("Are you sure you want to checkout Room No: " + roomNo
				+ "?");
	}

	function searchTable() {
		var input = document.getElementById("searchInput");
		var filter = input.value.toUpperCase();
		var table = document.getElementById("checkoutTable");
		var tr = table.getElementsByTagName("tr");

		for (var i = 1; i < tr.length; i++) {
			tr[i].style.display = "none";
			var tds = tr[i].getElementsByTagName("td");

			for (var j = 0; j < tds.length; j++) {
				if (tds[j]) {
					var txtValue = tds[j].textContent || tds[j].innerText;
					if (txtValue.toUpperCase().indexOf(filter) > -1) {
						tr[i].style.display = "";
						break;
					}
				}
			}
		}
	}
</script>

</head>

<body>

	<div class="container mt-4">

		<div class="card shadow p-3 p-md-4">

			<h3 class="text-center mb-3">🏨 Checkout Portal</h3>

			<!-- Top Buttons -->
			<div
				class="d-flex flex-column flex-md-row justify-content-between gap-2 mb-3">
				<a th:href="@{/dashboard}" class="btn btn-primary w-100 w-md-auto">
					⬅ Dashboard </a> <a th:href="@{/guests}"
					class="btn btn-success w-100 w-md-auto"> Guest Info ➡ </a>
			</div>

			<!-- Search -->
			<input type="text" id="searchInput" class="form-control mb-3"
				onkeyup="searchTable()"
				placeholder="🔍 Search by Room No, Name, Gender...">

			<!-- Responsive Table -->
			<div class="table-responsive">
				<table class="table table-striped table-hover text-center"
					id="checkoutTable">

					<thead class="table-primary">
						<tr>
							<th>Room No</th>
							<th>Name</th>
							<th>Gender</th>
							<th>Action</th>
						</tr>
					</thead>

					<tbody>
						<tr th:each="b : ${bookings}">
							<td th:text="${b.roomNo}"></td>
							<td th:text="${b.name}"></td>
							<td th:text="${b.gender}"></td>

							<td><a
								th:href="@{/deleteBooking/{roomNo}(roomNo=${b.roomNo})}"
								th:attr="onclick=|return confirmCheckout(${b.roomNo})|">
									<button class="btn btn-danger btn-sm checkout-btn">
										Checkout</button>
							</a></td>
						</tr>
					</tbody>

				</table>
			</div>

		</div>

	</div>

</body>
</html>
