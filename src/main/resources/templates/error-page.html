<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Error</title>

<!-- Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: #f4f6f9;
	font-family: Arial;
}

.error-text {
	color: red;
	font-size: 18px;
}
</style>

</head>

<body>

	<div
		class="container d-flex justify-content-center align-items-center vh-100">

		<div class="card shadow p-4 text-center"
			style="max-width: 400px; width: 100%;">

			<h4 class="mb-3 text-danger">⚠ Error</h4>

			<div class="error-text mb-4">
				<span th:text="${error}">Something went wrong</span>
			</div>

			<a th:href="@{/rooms}" class="btn btn-primary w-100"> 🏨 Back to
				Rooms </a>

		</div>

	</div>

</body>
</html>
