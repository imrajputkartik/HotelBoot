<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<!-- Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: #f4f6f9;
	font-family: 'Segoe UI', sans-serif;
}

.card {
	border-radius: 15px;
	transition: 0.3s;
	cursor: pointer;
}

.card:hover {
	transform: translateY(-6px);
	box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
}

/* Top color borders */
.rooms {
	border-top: 5px solid #3498db;
}

.services {
	border-top: 5px solid #9b59b6;
}

.checkout {
	border-top: 5px solid #f39c12;
}

.guests {
	border-top: 5px solid #1abc9c;
}

.footer {
	text-align: center;
	padding: 20px;
	color: #888;
}
</style>

</head>

<body>

	<!-- NAVBAR -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
		<a class="navbar-brand" href="#">🏨 Dashboard</a>

		<!-- Toggle button (mobile) -->
		<button class="navbar-toggler" type="button" data-bs-toggle="collapse"
			data-bs-target="#navBar">
			<span class="navbar-toggler-icon"></span>
		</button>

		<div class="collapse navbar-collapse justify-content-end" id="navBar">

			<div class="d-flex gap-2 mt-2 mt-lg-0">

				<a th:href="@{/guestRecord}" class="btn btn-primary"> Guest
					Record </a>

				<form th:action="@{/logout}" method="get">
					<button class="btn btn-danger">Logout</button>
				</form>

			</div>
		</div>
	</nav>

	<!-- MAIN CARDS -->
	<div class="container mt-4">

		<div class="row g-4">

			<div class="col-12 col-sm-6 col-lg-3">
				<a th:href="@{/rooms}" class="text-decoration-none text-dark">
					<div class="card shadow text-center p-4 rooms">
						<h4>🏠 Rooms</h4>
						<p class="text-muted">View & Book Rooms</p>
					</div>
				</a>
			</div>

			<div class="col-12 col-sm-6 col-lg-3">
				<a th:href="@{/services}" class="text-decoration-none text-dark">
					<div class="card shadow text-center p-4 services">
						<h4>🛎️ Services</h4>
						<p class="text-muted">Hotel services</p>
					</div>
				</a>
			</div>

			<div class="col-12 col-sm-6 col-lg-3">
				<a th:href="@{/checkout}" class="text-decoration-none text-dark">
					<div class="card shadow text-center p-4 checkout">
						<h4>💳 Checkout</h4>
						<p class="text-muted">Process checkout</p>
					</div>
				</a>
			</div>

			<div class="col-12 col-sm-6 col-lg-3">
				<a th:href="@{/guests}" class="text-decoration-none text-dark">
					<div class="card shadow text-center p-4 guests">
						<h4>👥 Guests</h4>
						<p class="text-muted">Guest information</p>
					</div>
				</a>
			</div>

		</div>

	</div>

	<!-- FOOTER -->
	<div class="footer">
		<p>© 2026 Hotel Management System</p>
	</div>

	<!-- Bootstrap JS (for navbar toggle) -->
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
