<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Payment</title>

<!-- Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	font-family: 'Segoe UI', sans-serif;
	background: linear-gradient(to right, #74ebd5, #ACB6E5);
}

.top-bar {
	margin-top: 20px;
}

.card {
	border-radius: 15px;
}

.qr-box {
	width: 180px;
	height: 180px;
	margin: auto;
	background: #eee;
	display: flex;
	align-items: center;
	justify-content: center;
	border-radius: 10px;
	font-weight: bold;
	color: #555;
}
</style>

</head>
<body>

	<div class="container">

		<!-- Back Button -->
		<div class="top-bar">
			<a href="javascript:history.back()" class="btn btn-primary"> ⬅
				Back to Form </a>
		</div>

		<!-- Center Card -->
		<div class="row justify-content-center mt-4">
			<div class="col-12 col-md-6 col-lg-4">

				<div class="card shadow text-center p-4">

					<h3 class="mb-3">💳 Complete Your Payment</h3>

					<div class="qr-box mb-3">Scan & Pay</div>

					<div class="fs-5 fw-bold text-success mb-3">
						💰 Amount: ₹ <span th:text="${amount}">0</span>
					</div>

					<form th:action="@{/confirmBooking}" method="post">
						<button type="submit" class="btn btn-success w-100">✅
							Confirm Payment</button>
					</form>

				</div>

			</div>
		</div>

	</div>

</body>
</html>
