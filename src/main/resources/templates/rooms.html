<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Rooms</title>

<!-- Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: #f4f6f9;
	font-family: Arial;
}

.header {
	background: #2c3e50;
	color: white;
	padding: 15px;
}

.room {
	border: 1px solid #ddd;
	border-radius: 8px;
	padding: 10px;
	margin-bottom: 10px;
	background: white;
}

.available {
	color: green;
	font-weight: bold;
}

.not-available {
	color: red;
	font-weight: bold;
}

.btn-book {
	background: green;
	color: white;
	padding: 5px 10px;
	border-radius: 5px;
	text-decoration: none;
	font-size: 14px;
}
</style>

</head>

<body>

	<!-- HEADER -->
	<div
		class="header d-flex align-items-center justify-content-between px-3 flex-wrap">
		<a th:href="@{/dashboard}" class="btn btn-primary btn-sm"> ⬅
			Dashboard </a>

		<h4 class="m-0 text-center flex-grow-1">Hotel Rooms</h4>

		<div style="width: 80px;"></div>
		<!-- balance spacing -->
	</div>

	<!-- CONTENT -->
	<div class="container mt-4">

		<div class="row g-4">

			<!-- SINGLE -->
			<div class="col-12 col-md-4">
				<div class="card shadow p-3">

					<h4 class="text-center">Single</h4>

					<div th:each="i : ${#numbers.sequence(1,20)}"
						th:with="isBooked=${bookedRooms.contains(i)}"
						class="room d-flex justify-content-between align-items-center">

						<span th:text="'Room ' + ${i} + ' (₹1000)'"></span> <span
							th:text="${isBooked} ? 'Booked' : 'Available'"
							th:classappend="${isBooked} ? 'not-available' : 'available'"></span>

						<a th:if="${!isBooked}" class="btn-book"
							th:href="@{/bookRoom(roomNo=${i}, price=1000)}"> Book </a>

					</div>

				</div>
			</div>

			<!-- DOUBLE -->
			<div class="col-12 col-md-4">
				<div class="card shadow p-3">

					<h4 class="text-center">Double</h4>

					<div th:each="i : ${#numbers.sequence(21,40)}"
						th:with="isBooked=${bookedRooms.contains(i)}"
						class="room d-flex justify-content-between align-items-center">

						<span th:text="'Room ' + ${i} + ' (₹2000)'"></span> <span
							th:text="${isBooked} ? 'Booked' : 'Available'"
							th:classappend="${isBooked} ? 'not-available' : 'available'"></span>

						<a th:if="${!isBooked}" class="btn-book"
							th:href="@{/bookRoom(roomNo=${i}, price=2000)}"> Book </a>

					</div>

				</div>
			</div>

			<!-- DELUXE -->
			<div class="col-12 col-md-4">
				<div class="card shadow p-3">

					<h4 class="text-center">Deluxe</h4>

					<div th:each="i : ${#numbers.sequence(41,50)}"
						th:with="isBooked=${bookedRooms.contains(i)}"
						class="room d-flex justify-content-between align-items-center">

						<span th:text="'Room ' + ${i} + ' (₹3000)'"></span> <span
							th:text="${isBooked} ? 'Booked' : 'Available'"
							th:classappend="${isBooked} ? 'not-available' : 'available'"></span>

						<a th:if="${!isBooked}" class="btn-book"
							th:href="@{/bookRoom(roomNo=${i}, price=3000)}"> Book </a>

					</div>

				</div>
			</div>

		</div>

	</div>

</body>
</html>
