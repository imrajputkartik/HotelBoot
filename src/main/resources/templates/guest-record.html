<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Guest Record</title>

<!-- Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: linear-gradient(to right, #ff9966, #ff5e62);
}

.card {
	border-radius: 15px;
}

.empty {
	color: red;
	font-weight: bold;
}
</style>

<script>
	function searchTable() {
		var input = document.getElementById("searchInput");
		var filter = input.value.toUpperCase();
		var table = document.getElementById("recordTable");
		var tr = table.getElementsByTagName("tr");

		for (var i = 1; i < tr.length; i++) {
			tr[i].style.display = "none";
			var tds = tr[i].getElementsByTagName("td");

			for (var j = 0; j < tds.length; j++) {
				if (tds[j]) {
					var txtValue = tds[j].textContent || tds[j].innerText;
					if (txtValue.toUpperCase().indexOf(filter) > -1) {
						tr[i].style.display = "";
						break;
					}
				}
			}
		}
	}
</script>

</head>

<body>

	<div class="container mt-4">

		<div class="card shadow p-3 p-md-4">

			<h3 class="text-center mb-3">📋 Guest Record (History)</h3>

			<!-- Buttons -->
			<div
				class="d-flex flex-column flex-md-row justify-content-between gap-2 mb-3">
				<a th:href="@{/dashboard}" class="btn btn-primary w-100 w-md-auto">
					⬅ Dashboard </a>
			</div>

			<!-- Search -->
			<input type="text" id="searchInput" class="form-control mb-3"
				onkeyup="searchTable()" placeholder="🔍 Search Guest Record...">

			<!-- Table -->
			<div class="table-responsive">

				<table class="table table-striped table-hover text-center"
					id="recordTable">

					<thead class="table-danger">
						<tr>
							<th>ID</th>
							<th>Room No</th>
							<th>Name</th>
							<th>Gender</th>
							<th>Members</th>
							<th>Address</th>
							<th>State</th>
							<th>Nationality</th>
							<th>Adhar No</th>
							<th>Mobile</th>
							<th>Amount</th>
							<th>Check In</th>
							<th>Check Out</th>
						</tr>
					</thead>

					<tbody>
						<tr th:each="g : ${records}">
							<td th:text="${g.id}"></td>
							<td th:text="${g.roomNo}"></td>
							<td th:text="${g.name}"></td>
							<td th:text="${g.gender}"></td>
							<td th:text="${g.members}"></td>
							<td th:text="${g.address}"></td>
							<td th:text="${g.state}"></td>
							<td th:text="${g.nationality}"></td>
							<td th:text="${g.adharNo}"></td>
							<td th:text="${g.mobile}"></td>
							<td>₹ <span th:text="${g.amount}"></span></td>
							<td th:text="${g.checkIn}"></td>
							<td th:text="${g.checkOut}"></td>
						</tr>

						<tr th:if="${records == null or #lists.isEmpty(records)}">
							<td colspan="13" class="empty text-center">No Guest Record
								Available</td>
						</tr>
					</tbody>

				</table>

			</div>

		</div>

	</div>

</body>
</html>
