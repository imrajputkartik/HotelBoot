<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Login</title>

<!-- Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: #eef2f7;
	font-family: 'Segoe UI', sans-serif;
}

.login-box {
	max-width: 900px;
	border-radius: 16px;
	overflow: hidden;
}

.left-panel {
	background: #1f2937;
	color: white;
}

.left-panel p {
	color: #cbd5e1;
}

.login-btn {
	width: 100%;
}
</style>

</head>

<body>

	<div
		class="container d-flex justify-content-center align-items-center vh-100">

		<div class="row shadow login-box w-100">

			<!-- LEFT -->
			<div
				class="col-md-6 d-none d-md-flex flex-column justify-content-center p-5 left-panel">
				<h1>🏨 Hotel System</h1>
				<p>Manage bookings, rooms, and guests with a powerful dashboard.
					Designed for real-world hotel management.</p>
			</div>

			<!-- RIGHT -->
			<div class="col-12 col-md-6 bg-white p-4 p-md-5">

				<h3 class="mb-4 text-center">Login to your account</h3>

				<form th:action="@{/doLogin}" method="post" autocomplete="off">

					<input type="text" name="fakeuser" style="display: none"> <input
						type="password" name="fakepass" style="display: none">

					<div class="mb-3">
						<label class="form-label">Username</label> <input type="text"
							name="username" class="form-control" required>
					</div>

					<div class="mb-3">
						<label class="form-label">Password</label> <input type="password"
							name="password" class="form-control" required>
					</div>

					<button type="submit" class="btn btn-primary login-btn">
						Sign In</button>

				</form>

				<!-- error -->
				<div class="text-danger mt-3 text-center" th:if="${error}"
					th:text="${error}"></div>

				<div class="text-center text-muted mt-4" style="font-size: 12px;">
					© 2026 Hotel Management System</div>

			</div>

		</div>

	</div>

</body>
</html>
