<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Booking Success</title>

<!-- Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	font-family: 'Segoe UI', sans-serif;
	background: linear-gradient(to right, #74ebd5, #ACB6E5);
}

.card {
	border-radius: 15px;
}

.success-icon {
	font-size: 60px;
	color: #27ae60;
}

.details {
	background: #f9f9f9;
	border-radius: 10px;
}
</style>

</head>
<body>

	<div class="container mt-5">

		<div class="row justify-content-center">
			<div class="col-12 col-md-8 col-lg-6">

				<div class="card shadow p-4 text-center">

					<div class="success-icon">✅</div>

					<h3 class="text-success mt-2">Booking Confirmed!</h3>
					<p>Your room has been successfully booked 🎉</p>

					<!-- Booking Details -->
					<div class="details p-3 mt-3 text-start" th:if="${booking != null}">

						<div class="d-flex justify-content-between border-bottom py-2">
							<b>Room No:</b> <span th:text="${booking.roomNo}"></span>
						</div>

						<div class="d-flex justify-content-between border-bottom py-2">
							<b>Guest Name:</b> <span th:text="${booking.name}"></span>
						</div>

						<div class="d-flex justify-content-between border-bottom py-2">
							<b>Mobile:</b> <span th:text="${booking.mobile}"></span>
						</div>

						<div class="d-flex justify-content-between border-bottom py-2">
							<b>Members:</b> <span th:text="${booking.members}"></span>
						</div>

						<div class="d-flex justify-content-between border-bottom py-2">
							<b>Check-In:</b> <span th:text="${booking.checkIn}"></span>
						</div>

						<div class="d-flex justify-content-between">
							<b>Check-Out:</b> <span th:text="${booking.checkOut}"></span>
						</div>

					</div>

					<!-- Buttons -->
					<div
						class="mt-4 d-flex flex-column flex-md-row gap-2 justify-content-center">
						<a th:href="@{/rooms}" class="btn btn-primary w-100 w-md-auto">
							🏨 View Rooms </a> <a th:href="@{/dashboard}"
							class="btn btn-dark w-100 w-md-auto"> 🏠 Dashboard </a>
					</div>

				</div>

			</div>
		</div>

	</div>

</body>
</html>
