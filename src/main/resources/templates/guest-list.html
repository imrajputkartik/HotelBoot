<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Guest Information</title>

<!-- Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: linear-gradient(to right, #43cea2, #185a9d);
}

.card {
	border-radius: 15px;
}

.empty {
	color: red;
	font-weight: bold;
}
</style>

<script>
	function searchTable() {
		var input = document.getElementById("searchInput");
		var filter = input.value.toUpperCase();
		var table = document.getElementById("guestTable");
		var tr = table.getElementsByTagName("tr");

		for (var i = 1; i < tr.length; i++) {
			tr[i].style.display = "none";
			var tds = tr[i].getElementsByTagName("td");

			for (var j = 0; j < tds.length; j++) {
				if (tds[j]) {
					var txtValue = tds[j].textContent || tds[j].innerText;
					if (txtValue.toUpperCase().indexOf(filter) > -1) {
						tr[i].style.display = "";
						break;
					}
				}
			}
		}
	}
</script>

</head>

<body>

	<div class="container mt-4">

		<div class="card shadow p-3 p-md-4">

			<h3 class="text-center mb-3">👥 Guest Information</h3>

			<!-- Top Buttons -->
			<div
				class="d-flex flex-column flex-md-row justify-content-between gap-2 mb-3">
				<a th:href="@{/dashboard}" class="btn btn-primary w-100 w-md-auto">
					⬅ Dashboard </a> <a th:href="@{/checkout}"
					class="btn btn-warning w-100 w-md-auto"> Checkout Portal ➡ </a>
			</div>

			<!-- Search -->
			<input type="text" id="searchInput" class="form-control mb-3"
				onkeyup="searchTable()" placeholder="🔍 Search Guest Details...">

			<!-- Responsive Table -->
			<div class="table-responsive">
				<table class="table table-striped table-hover text-center"
					id="guestTable">

					<thead class="table-primary">
						<tr>
							<th>Room No</th>
							<th>Name</th>
							<th>Gender</th>
							<th>Members</th>
							<th>Address</th>
							<th>State</th>
							<th>Nationality</th>
							<th>Adhar No</th>
							<th>Mobile</th>
							<th>Check In</th>
							<th>Check Out</th>
							<th>Amount</th>
						</tr>
					</thead>

					<tbody>
						<tr th:each="b : ${bookings}">
							<td th:text="${b.roomNo}"></td>
							<td th:text="${b.name}"></td>
							<td th:text="${b.gender}"></td>
							<td th:text="${b.members}"></td>
							<td th:text="${b.address}"></td>
							<td th:text="${b.state}"></td>
							<td th:text="${b.nationality}"></td>
							<td th:text="${b.adharNo}"></td>
							<td th:text="${b.mobile}"></td>
							<td th:text="${b.checkIn}"></td>
							<td th:text="${b.checkOut}"></td>
							<td>₹ <span th:text="${b.amount}"></span></td>
						</tr>

						<!-- Empty -->
						<tr th:if="${bookings == null or #lists.isEmpty(bookings)}">
							<td colspan="12" class="empty text-center">No Guest Data
								Available</td>
						</tr>
					</tbody>

				</table>
			</div>

		</div>

	</div>

</body>
</html>
