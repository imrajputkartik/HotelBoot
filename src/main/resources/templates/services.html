<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Services</title>

<!-- Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

<style>
body {
	background: linear-gradient(to right, #f5f7fa, #c3cfe2);
	font-family: 'Segoe UI', sans-serif;
}

/* Header */
.header {
	background: #4a90e2;
	color: white;
	padding: 40px 20px;
	text-align: center;
}

/* Card */
.service-card {
	border-radius: 15px;
	transition: 0.3s;
	cursor: pointer;
}

.service-card:hover {
	transform: translateY(-8px);
	box-shadow: 0 15px 25px rgba(0, 0, 0, 0.2);
}

.icon {
	font-size: 30px;
	color: #4a90e2;
}
</style>
</head>

<body>

	<!-- Top Bar -->
	<div class="container mt-3">
		<a th:href="@{/dashboard}" class="btn btn-primary"> ⬅ Dashboard </a>
	</div>

	<!-- Header -->
	<div class="header">
		<h2>Our Premium Hotel Services</h2>
	</div>

	<!-- Services -->
	<div class="container mt-4">

		<div class="row g-4">

			<!-- Card -->
			<div class="col-6 col-md-4 col-lg-3">
				<div class="card service-card text-center p-3 shadow">
					<i class="fas fa-parking icon"></i>
					<p class="mt-2 fw-semibold">Parking</p>
				</div>
			</div>

			<div class="col-6 col-md-4 col-lg-3">
				<div class="card service-card text-center p-3 shadow">
					<i class="fas fa-bed icon"></i>
					<p class="mt-2 fw-semibold">AC Rooms</p>
				</div>
			</div>

			<div class="col-6 col-md-4 col-lg-3">
				<div class="card service-card text-center p-3 shadow">
					<i class="fas fa-water icon"></i>
					<p class="mt-2 fw-semibold">Mineral Water</p>
				</div>
			</div>

			<div class="col-6 col-md-4 col-lg-3">
				<div class="card service-card text-center p-3 shadow">
					<i class="fas fa-swimmer icon"></i>
					<p class="mt-2 fw-semibold">Swimming Pool</p>
				</div>
			</div>

			<div class="col-6 col-md-4 col-lg-3">
				<div class="card service-card text-center p-3 shadow">
					<i class="fas fa-wifi icon"></i>
					<p class="mt-2 fw-semibold">Free WiFi</p>
				</div>
			</div>

			<div class="col-6 col-md-4 col-lg-3">
				<div class="card service-card text-center p-3 shadow">
					<i class="fas fa-concierge-bell icon"></i>
					<p class="mt-2 fw-semibold">Room Service</p>
				</div>
			</div>

			<div class="col-6 col-md-4 col-lg-3">
				<div class="card service-card text-center p-3 shadow">
					<i class="fas fa-tshirt icon"></i>
					<p class="mt-2 fw-semibold">Laundry</p>
				</div>
			</div>

			<div class="col-6 col-md-4 col-lg-3">
				<div class="card service-card text-center p-3 shadow">
					<i class="fas fa-dumbbell icon"></i>
					<p class="mt-2 fw-semibold">Gym</p>
				</div>
			</div>

			<div class="col-6 col-md-4 col-lg-3">
				<div class="card service-card text-center p-3 shadow">
					<i class="fas fa-utensils icon"></i>
					<p class="mt-2 fw-semibold">Restaurant</p>
				</div>
			</div>

			<div class="col-6 col-md-4 col-lg-3">
				<div class="card service-card text-center p-3 shadow">
					<i class="fas fa-cocktail icon"></i>
					<p class="mt-2 fw-semibold">Bar</p>
				</div>
			</div>

			<div class="col-6 col-md-4 col-lg-3">
				<div class="card service-card text-center p-3 shadow">
					<i class="fas fa-spa icon"></i>
					<p class="mt-2 fw-semibold">Spa</p>
				</div>
			</div>

			<div class="col-6 col-md-4 col-lg-3">
				<div class="card service-card text-center p-3 shadow">
					<i class="fas fa-phone-alt icon"></i>
					<p class="mt-2 fw-semibold">24x7 Reception</p>
				</div>
			</div>

		</div>

	</div>

</body>
</html>
